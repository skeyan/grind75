<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grind 75</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" id="hljs-theme" />

  <style>
    :root {
      --bg: #0e1117;
      --bg-card: #161b22;
      --bg-sidebar: #0d1117;
      --border: #21262d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --easy: #3fb950;
      --medium: #d29922;
      --hard: #f85149;
      --tag-bg: rgba(88, 166, 255, 0.12);
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    /* ---- Layout ---- */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .sidebar-header h1 span {
      color: var(--accent);
    }

    .sidebar-header p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .filters {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .problem-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .problem-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.12s;
      border-left: 3px solid transparent;
    }
    .problem-item:hover { background: rgba(255,255,255,0.04); }
    .problem-item.active {
      background: rgba(88, 166, 255, 0.08);
      border-left-color: var(--accent);
    }

    .problem-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      min-width: 28px;
    }

    .problem-info { flex: 1; min-width: 0; }

    .problem-title {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .problem-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .diff-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .diff-dot.Easy   { background: var(--easy); }
    .diff-dot.Medium { background: var(--medium); }
    .diff-dot.Hard   { background: var(--hard); }

    /* ---- Main content ---- */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .main-title-area h2 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .main-badges {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      align-items: center;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 12px;
    }
    .badge.Easy   { background: rgba(63,185,80,0.15); color: var(--easy); }
    .badge.Medium { background: rgba(210,153,34,0.15); color: var(--medium); }
    .badge.Hard   { background: rgba(248,81,73,0.15); color: var(--hard); }

    .badge-topic {
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 12px;
      background: var(--tag-bg);
      color: var(--accent);
    }

    .lc-link {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.15s;
    }
    .lc-link:hover { background: rgba(88,166,255,0.1); border-color: var(--accent); }

    .tabs {
      display: flex;
      gap: 0;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 12px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .content-pane { display: none; }
    .content-pane.active { display: block; }

    /* ---- Markdown styles ---- */
    .markdown-body {
      max-width: 780px;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .markdown-body h1 { display: none; }
    .markdown-body h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 28px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .markdown-body h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 20px 0 8px;
    }
    .markdown-body p { margin: 8px 0; }
    .markdown-body ul, .markdown-body ol { margin: 8px 0; padding-left: 24px; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body strong { font-weight: 600; }
    .markdown-body em { font-style: italic; color: var(--text-muted); }
    .markdown-body a { color: var(--accent); text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }

    .markdown-body code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85em;
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .markdown-body pre {
      margin: 12px 0;
      border-radius: var(--radius);
      overflow-x: auto;
    }

    .markdown-body pre code {
      display: block;
      padding: 16px;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.82rem;
      line-height: 1.55;
    }

    .markdown-body table {
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 0.88rem;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border);
      padding: 8px 14px;
      text-align: left;
    }
    .markdown-body th { background: rgba(255,255,255,0.04); font-weight: 600; }

    .markdown-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      color: var(--text-muted);
      margin: 12px 0;
    }

    /* ---- Solution code pane ---- */
    .solution-code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.84rem;
      line-height: 1.6;
      max-width: 780px;
    }

    .solution-code pre {
      border-radius: var(--radius);
      overflow-x: auto;
    }

    .solution-code pre code {
      display: block;
      padding: 20px;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* ---- Empty state ---- */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 12px;
    }

    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 0.95rem; }

    /* ---- Loading ---- */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ---- Responsive ---- */
    .menu-toggle {
      display: none;
      font-family: inherit;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px 8px;
    }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }

      .sidebar {
        position: fixed;
        inset: 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        width: 300px;
      }
      .sidebar.open { transform: translateX(0); }

      .menu-toggle { display: block; }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 99;
        background: rgba(0,0,0,0.5);
        display: none;
      }
      .overlay.show { display: block; }

      .content { padding: 20px 16px; }
      .main-header { padding: 12px 16px; }
      .tabs { padding: 0 16px; }
    }

    /* KaTeX math inline styling fallback */
    .math-inline { font-family: 'IBM Plex Mono', monospace; font-size: 0.88em; }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Grind <span>75</span></h1>
        <p id="problem-count">Loading problems...</p>
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Easy">Easy</button>
        <button class="filter-btn" data-filter="Medium">Medium</button>
        <button class="filter-btn" data-filter="Hard">Hard</button>
      </div>
      <div class="problem-list" id="problem-list"></div>
    </aside>

    <main class="main">
      <div class="main-header" id="main-header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menu-toggle">&#9776;</button>
          <div class="main-title-area" id="main-title-area">
            <h2 id="main-title">Select a problem</h2>
            <div class="main-badges" id="main-badges"></div>
          </div>
        </div>
        <a class="lc-link" id="lc-link" href="#" target="_blank" rel="noopener" style="display:none">
          LeetCode &nearr;
        </a>
      </div>
      <div class="tabs" id="tabs" style="display:none">
        <button class="tab active" data-tab="notes">Notes</button>
        <button class="tab" data-tab="solution">Solution</button>
      </div>
      <div class="content" id="content">
        <div class="empty-state" id="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <p>Choose a problem from the sidebar to begin</p>
        </div>
        <div class="content-pane" id="pane-notes"><div class="markdown-body" id="notes-body"></div></div>
        <div class="content-pane" id="pane-solution"><div class="solution-code" id="solution-body"></div></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/javascript.min.js"></script>

  <script>
    const BASE = "problems";
    let problems = [];
    let activeSlug = null;
    let activeFilter = "all";
    const cache = {};

    // DOM refs
    const listEl = document.getElementById("problem-list");
    const countEl = document.getElementById("problem-count");
    const titleEl = document.getElementById("main-title");
    const badgesEl = document.getElementById("main-badges");
    const lcLink = document.getElementById("lc-link");
    const tabsEl = document.getElementById("tabs");
    const notesBody = document.getElementById("notes-body");
    const solutionBody = document.getElementById("solution-body");
    const emptyState = document.getElementById("empty-state");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    // Configure marked
    marked.setOptions({
      breaks: true,
      gfm: true,
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
    });

    // Render LaTeX-style inline math as styled code
    function renderMath(html) {
      return html
        .replace(/\\\((.+?)\\\)/g, '<code class="math-inline">$1</code>')
        .replace(/\\\[(.+?)\\\]/gs, '<pre><code class="math-inline">$1</code></pre>');
    }

    async function init() {
      const res = await fetch("problems.json");
      problems = await res.json();
      countEl.textContent = `${problems.length} problem${problems.length !== 1 ? "s" : ""}`;
      renderList();

      // Deep-link support
      const hash = location.hash.slice(1);
      if (hash && problems.find((p) => p.slug === hash)) {
        selectProblem(hash);
      }
    }

    function renderList() {
      const filtered =
        activeFilter === "all"
          ? problems
          : problems.filter((p) => p.difficulty === activeFilter);

      listEl.innerHTML = filtered
        .map(
          (p) => `
        <div class="problem-item ${p.slug === activeSlug ? "active" : ""}" data-slug="${p.slug}">
          <span class="diff-dot ${p.difficulty}"></span>
          <span class="problem-num">${p.number || "#"}</span>
          <div class="problem-info">
            <div class="problem-title">${p.title}</div>
            <div class="problem-meta">${p.topics.join(" · ")}</div>
          </div>
        </div>`
        )
        .join("");
    }

    async function selectProblem(slug) {
      activeSlug = slug;
      location.hash = slug;
      renderList();

      const problem = problems.find((p) => p.slug === slug);
      titleEl.textContent = problem.title;

      badgesEl.innerHTML =
        `<span class="badge ${problem.difficulty}">${problem.difficulty}</span>` +
        problem.topics.map((t) => `<span class="badge-topic">${t}</span>`).join("");

      if (problem.leetcode) {
        lcLink.href = problem.leetcode;
        lcLink.style.display = "";
      } else {
        lcLink.style.display = "none";
      }

      tabsEl.style.display = "";
      emptyState.style.display = "none";

      if (!cache[slug]) {
        const [notesRes, solutionRes] = await Promise.all([
          fetch(`${BASE}/${slug}/notes.md`).then((r) => (r.ok ? r.text() : "")),
          fetch(`${BASE}/${slug}/solution.js`).then((r) => (r.ok ? r.text() : "")),
        ]);
        cache[slug] = { notes: notesRes, solution: solutionRes };
      }

      const { notes, solution } = cache[slug];
      notesBody.innerHTML = renderMath(marked.parse(notes));
      solutionBody.innerHTML = `<pre><code class="language-javascript">${
        hljs.highlight(solution, { language: "javascript" }).value
      }</code></pre>`;

      switchTab("notes");
      closeSidebar();
    }

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((t) => {
        t.classList.toggle("active", t.dataset.tab === name);
      });
      document.querySelectorAll(".content-pane").forEach((p) => {
        p.classList.toggle("active", p.id === `pane-${name}`);
      });
    }

    function closeSidebar() {
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    }

    // Event: click problem
    listEl.addEventListener("click", (e) => {
      const item = e.target.closest(".problem-item");
      if (item) selectProblem(item.dataset.slug);
    });

    // Event: filter buttons
    document.getElementById("filters").addEventListener("click", (e) => {
      if (!e.target.classList.contains("filter-btn")) return;
      activeFilter = e.target.dataset.filter;
      document.querySelectorAll(".filter-btn").forEach((b) => {
        b.classList.toggle("active", b.dataset.filter === activeFilter);
      });
      renderList();
    });

    // Event: tabs
    tabsEl.addEventListener("click", (e) => {
      if (e.target.classList.contains("tab")) switchTab(e.target.dataset.tab);
    });

    // Event: mobile menu
    document.getElementById("menu-toggle").addEventListener("click", () => {
      sidebar.classList.add("open");
      overlay.classList.add("show");
    });
    overlay.addEventListener("click", closeSidebar);

    init();
  </script>
</body>
</html>
