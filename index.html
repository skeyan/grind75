<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grind 75</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" id="hljs-theme" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Grind <span>75</span></h1>
        <p id="problem-count">Loading problems...</p>
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Easy">Easy</button>
        <button class="filter-btn" data-filter="Medium">Medium</button>
        <button class="filter-btn" data-filter="Hard">Hard</button>
      </div>
      <div class="problem-list" id="problem-list"></div>
    </aside>

    <main class="main">
      <div class="main-header" id="main-header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menu-toggle">&#9776;</button>
          <div class="main-title-area" id="main-title-area">
            <h2 id="main-title" tabindex="-1">Select a problem</h2>
            <div class="main-badges" id="main-badges"></div>
          </div>
        </div>
        <a class="lc-link" id="lc-link" href="#" target="_blank" rel="noopener" style="display:none">
          LeetCode &nearr;
        </a>
      </div>
      <div class="tabs" id="tabs" style="display:none">
        <button class="tab active" data-tab="notes">Notes</button>
        <button class="tab" data-tab="solution">Solution</button>
      </div>
      <div class="content" id="content">
        <div class="empty-state" id="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <p>Choose a problem from the sidebar to begin</p>
        </div>
        <div class="content-pane" id="pane-notes"><div class="markdown-body" id="notes-body"></div></div>
        <div class="content-pane" id="pane-solution"><div class="solution-code" id="solution-body"></div></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/javascript.min.js"></script>

  <script>
    const BASE = "problems";
    let problems = [];
    let activeSlug = null;
    let activeFilter = "all";
    const cache = {};

    // DOM refs
    const listEl = document.getElementById("problem-list");
    const countEl = document.getElementById("problem-count");
    const titleEl = document.getElementById("main-title");
    const badgesEl = document.getElementById("main-badges");
    const lcLink = document.getElementById("lc-link");
    const tabsEl = document.getElementById("tabs");
    const notesBody = document.getElementById("notes-body");
    const solutionBody = document.getElementById("solution-body");
    const emptyState = document.getElementById("empty-state");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    // Configure marked
    marked.setOptions({
      breaks: true,
      gfm: true,
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
    });

    // Render LaTeX-style inline math as styled code
    function renderMath(html) {
      return html
        .replace(/\\\((.+?)\\\)/g, '<code class="math-inline">$1</code>')
        .replace(/\\\[(.+?)\\\]/gs, '<pre><code class="math-inline">$1</code></pre>');
    }

    async function init() {
      const res = await fetch("problems.json");
      problems = await res.json();
      countEl.textContent = `${problems.length} problem${problems.length !== 1 ? "s" : ""}`;
      renderList();

      // Deep-link support
      const hash = location.hash.slice(1);
      if (hash && problems.find((p) => p.slug === hash)) {
        selectProblem(hash);
      }
    }

    function renderList() {
      const filtered =
        activeFilter === "all"
          ? problems
          : problems.filter((p) => p.difficulty === activeFilter);

      listEl.innerHTML = filtered
        .map(
          (p) => `
        <div class="problem-item ${p.slug === activeSlug ? "active" : ""}" data-slug="${p.slug}" tabindex="0" role="button">
          <span class="diff-dot ${p.difficulty}"></span>
          <span class="problem-num">${p.number || "#"}</span>
          <div class="problem-info">
            <div class="problem-title">${p.title}</div>
            <div class="problem-meta">${p.topics.join(" · ")}</div>
          </div>
        </div>`
        )
        .join("");
    }

    async function selectProblem(slug) {
      activeSlug = slug;
      location.hash = slug;
      renderList();

      const problem = problems.find((p) => p.slug === slug);
      titleEl.textContent = problem.title;

      badgesEl.innerHTML =
        `<span class="badge ${problem.difficulty}">${problem.difficulty}</span>` +
        problem.topics.map((t) => `<span class="badge-topic">${t}</span>`).join("");

      if (problem.leetcode) {
        lcLink.href = problem.leetcode;
        lcLink.style.display = "";
      } else {
        lcLink.style.display = "none";
      }

      tabsEl.style.display = "";
      emptyState.style.display = "none";

      if (!cache[slug]) {
        const [notesRes, solutionRes] = await Promise.all([
          fetch(`${BASE}/${slug}/notes.md`).then((r) => (r.ok ? r.text() : "")),
          fetch(`${BASE}/${slug}/solution.js`).then((r) => (r.ok ? r.text() : "")),
        ]);
        cache[slug] = { notes: notesRes, solution: solutionRes };
      }

      const { notes, solution } = cache[slug];
      notesBody.innerHTML = renderMath(marked.parse(notes));
      solutionBody.innerHTML = `<pre><code class="language-javascript">${
        hljs.highlight(solution, { language: "javascript" }).value
      }</code></pre>`;

      switchTab("notes");
      closeSidebar();
      requestAnimationFrame(() => titleEl.focus());
    }

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((t) => {
        t.classList.toggle("active", t.dataset.tab === name);
      });
      document.querySelectorAll(".content-pane").forEach((p) => {
        p.classList.toggle("active", p.id === `pane-${name}`);
      });
    }

    function closeSidebar() {
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    }

    // Event: click / keyboard select problem
    listEl.addEventListener("click", (e) => {
      const item = e.target.closest(".problem-item");
      if (item) selectProblem(item.dataset.slug);
    });

    listEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        const item = e.target.closest(".problem-item");
        if (item) {
          e.preventDefault();
          selectProblem(item.dataset.slug);
        }
      }
    });

    // Event: filter buttons
    document.getElementById("filters").addEventListener("click", (e) => {
      if (!e.target.classList.contains("filter-btn")) return;
      activeFilter = e.target.dataset.filter;
      document.querySelectorAll(".filter-btn").forEach((b) => {
        b.classList.toggle("active", b.dataset.filter === activeFilter);
      });
      renderList();
    });

    // Event: tabs
    tabsEl.addEventListener("click", (e) => {
      if (e.target.classList.contains("tab")) switchTab(e.target.dataset.tab);
    });

    // Event: mobile menu
    document.getElementById("menu-toggle").addEventListener("click", () => {
      sidebar.classList.add("open");
      overlay.classList.add("show");
    });
    overlay.addEventListener("click", closeSidebar);

    init();
  </script>
</body>
</html>
